# =============================================================================
# OfferPilot API — nginx reverse proxy (HTTPS termination -> uvicorn :8000)
#
# Install on the backend server:
#   sudo mkdir -p /etc/nginx/ssl
#   sudo cp offerpilot-api.conf /etc/nginx/conf.d/offerpilot-api.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# The FastAPI app (started by `make debug`, uvicorn on 127.0.0.1:8000) already
# handles CORS via its CORS_ORIGINS setting. DO NOT add `Access-Control-*`
# headers in nginx — duplicate CORS headers make the browser reject the
# response. This file only terminates TLS and forwards requests transparently.
#
# Tip: run uvicorn with `--proxy-headers --forwarded-allow-ips=127.0.0.1` so it
# trusts the X-Forwarded-Proto header set below and knows the request is HTTPS.
# =============================================================================

# ---- 1) Redirect plain HTTP to HTTPS ----------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.example.com;        # <-- your domain (or 123.59.6.242)

    # Let nginx serve Let's Encrypt HTTP-01 challenges (certbot --webroot).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 2) HTTPS server: terminate TLS, proxy to the FastAPI backend -----------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.example.com;        # <-- your domain (or 123.59.6.242)

    # --- TLS certificate -----------------------------------------------------
    # Option A (RECOMMENDED): a real domain + browser-trusted Let's Encrypt cert.
    #   sudo certbot --nginx -d api.example.com
    # (certbot fills the two paths below in automatically.)
    ssl_certificate     /etc/letsencrypt/live/api.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.example.com/privkey.pem;
    #
    # Option B (bare IP / quick test): self-signed cert. WARNING — a browser
    # will REJECT a self-signed cert for cross-origin fetch() from GitHub Pages
    # (net::ERR_CERT_AUTHORITY_INVALID) with no prompt. It only works if you
    # manually trust the cert in the OS/browser. Generate one with:
    #   sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
    #     -keyout /etc/nginx/ssl/offerpilot.key \
    #     -out    /etc/nginx/ssl/offerpilot.crt -subj "/CN=123.59.6.242"
    # ssl_certificate     /etc/nginx/ssl/offerpilot.crt;
    # ssl_certificate_key /etc/nginx/ssl/offerpilot.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Resume / document uploads — raise nginx's default 1m request body limit.
    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Forward the real client and the original scheme (so the app sees HTTPS).
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # WebSocket / streaming upgrade (harmless for plain JSON requests).
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # AI parsing/matching runs inside the request — allow slow responses.
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;

        proxy_buffering off;
    }
}
