name: Deploy Web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @offerpilot/web build
        env:
          # Project sites are served under /<repo>/. For a user/org site or a
          # custom domain, set this to "/" via a repo variable instead.
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          # "local" builds a fully in-browser app (IndexedDB + on-device AI),
          # no backend required. To point the Pages build at a deployed backend
          # instead, set VITE_DATA_MODE to "remote" and VITE_API_BASE_URL below.
          VITE_DATA_MODE: local
          # Only used in remote mode. Set repo variable VITE_API_BASE_URL to
          # your deployed backend URL when switching VITE_DATA_MODE to remote.
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
